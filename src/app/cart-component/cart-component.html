<div class="cart-container">

  <h2>Mon Panier</h2>

  <!-- panier vide -->
  @if(cart.length === 0) {
    <p class="empty">Votre panier est vide 🛒</p>
  }

  <!-- liste produits -->
  @for (item of cart; track item) {

    <div class="cart-item">

      <!-- IMAGE CORRIGÉE ICI -->
      <img [src]="'assets/images/' + item.image" />

      <div class="info">
        <p class="name">{{ item.nom }}</p>
        <p class="price">{{ item.prix }} €</p>
      </div>

      <div class="quantity">
        <button (click)="decrease(item)">-</button>
        <span>{{ item.quantity }}</span>
        <button (click)="increase(item)">+</button>
      </div>

      <button class="remove" (click)="remove(item)">
        Supprimer
      </button>

    </div>

  }

  <!-- total + vider panier -->
  @if(cart.length > 0) {

    <div class="total">
      Total : {{ total }} €
    </div>

    <button class="clear-btn" (click)="clearCart()">
      Vider le panier
    </button>

  }

</div>
