<h2>Mon Panier 🛒</h2>

<p>Nombre de produits : {{ cart.length }}</p>

@if (cart.length === 0) {
  <p>Panier vide</p>
}

@if (cart.length > 0) {

  @for (p of cart; track p.id) {
    <div>
      <h3>{{ p.nom }}</h3>

      <p>{{ p.prix }} €</p>

      <p>Quantité : {{ p.quantity }}</p>

      <div class="actions">
        <button (click)="increase(p)">+</button>
        <button (click)="decrease(p)">-</button>
        <button (click)="remove(p)">Supprimer</button>
      </div>

      <hr>
    </div>
  }

  <h3>Total : {{ total }} €</h3>

  <button (click)="clearCart()">
    Vider le panier
  </button>

}
