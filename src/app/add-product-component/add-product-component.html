<h2>Ajouter un produit</h2>

<form (ngSubmit)="addProduct()">

  <!-- NOM -->
  <div>
    <label>Nom</label>
    <input
      type="text"
      [(ngModel)]="newProduct.nom"
      name="nom"
      required
    >
  </div>

  <!-- PRIX -->
  <div>
    <label>Prix</label>
    <input
      type="number"
      [(ngModel)]="newProduct.prix"
      name="prix"
      required
    >
  </div>

  <!-- STOCK -->
  <div>
    <label>Stock</label>
    <input
      type="number"
      [(ngModel)]="newProduct.stock"
      name="stock"
      required
    >
  </div>

  <!-- IMAGE -->
  <div>
    <label>Image</label>
    <input
      type="text"
      [(ngModel)]="newProduct.image"
      name="image"
    >
  </div>

  <!-- CATEGORY -->
  <div>
    <label>Catégorie</label>
    <input
      type="text"
      [(ngModel)]="newProduct.category"
      name="category"
      required
    >
  </div>

  <!-- BUTTON -->
  <button type="submit">
    Ajouter le produit
  </button>

</form>
