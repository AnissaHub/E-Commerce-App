<h2>Liste des produits</h2>

<!-- Recherche -->
<div class="search">
  <input
    type="text"
    placeholder="Rechercher un produit..."
    [(ngModel)]="searchText"
    (input)="resetPage()"
  />
</div>

<!-- Filtrage -->
<div class="filter">
  @for (c of categories; track c) {
    <button (click)="selectedCategory = c; resetPage()">
      {{ c }}
    </button>
  }
</div>

<!-- Liste paginée des produits -->
<div class="container">
  @for (p of paginatedProducts; track p.id) {
    <app-product
      [product]="p"
      (addToCart)="onAddToCart($event)">
    </app-product>
  }
</div>

<!-- Pagination -->
<div class="pagination">

  <button
    (click)="prevPage()"
    [disabled]="currentPage === 1">
    ◀ Précédent
  </button>

  <span>
    Page {{ currentPage }}
  </span>

  <button
    (click)="nextPage()"
    [disabled]="currentPage * itemsPerPage >= filteredProducts.length">
    Suivant ▶
  </button>

</div>
